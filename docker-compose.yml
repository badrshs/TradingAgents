# ──────────────────────────────────────────────────────────────
#  TradingAgents – Docker Compose
#
#  Quick start:
#    1. Copy .env.example to .env and fill in your API keys
#    2. docker compose run --rm tradingagents
#
#  Or run a one-off analysis:
#    docker compose run --rm tradingagents python main.py
# ──────────────────────────────────────────────────────────────

services:
  tradingagents:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      # Persist analysis results on the host
      - ./results:/app/results
      # Persist data cache to avoid re-downloading market data
      - ./data_cache:/app/tradingagents/dataflows/data_cache
    stdin_open: true   # Required for interactive CLI
    tty: true          # Required for Rich terminal UI
